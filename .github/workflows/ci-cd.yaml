name: CI/CD - Spring Boot Gradle Serverless

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      stage:
        description: Serverless stage to deploy
        required: true
        default: prod
        type: choice
        options: [dev, staging, prod]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref || github.ref_name }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "24"
  SENTRY_AGENT_VERSION: "8.47.0"
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and run tests
        run: ./gradlew clean build --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          if-no-files-found: ignore

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-artifact
          path: build/libs/*.jar
          if-no-files-found: error

  deploy:
    name: Deploy with Serverless Framework
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    environment:
      name: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'dev' && 'dev' || github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'master' && 'prod' || github.event.inputs.stage || 'prod' }}

    steps:
      - name: Resolve deployment stage
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.base.ref }}" = "dev" ]; then
              echo "SERVERLESS_STAGE=dev" >> "$GITHUB_ENV"
            elif [ "${{ github.event.pull_request.base.ref }}" = "master" ]; then
              echo "SERVERLESS_STAGE=prod" >> "$GITHUB_ENV"
            else
              echo "Unsupported PR target branch"
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SERVERLESS_STAGE=${{ github.event.inputs.stage }}" >> "$GITHUB_ENV"
          else
            echo "SERVERLESS_STAGE=prod" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Serverless Framework
        run: npm install --global serverless

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build deployable artifact
        run: ./gradlew clean bootJar --no-daemon

      - name: Download Sentry OpenTelemetry agent
        run: |
          curl -L \
            -o sentry-opentelemetry-agent.jar \
            "https://repo.maven.apache.org/maven2/io/sentry/sentry-opentelemetry-agent/${SENTRY_AGENT_VERSION}/sentry-opentelemetry-agent-${SENTRY_AGENT_VERSION}.jar"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ env.SERVERLESS_STAGE }}
          SENTRY_AUTO_INIT: "false"
          JAVA_TOOL_OPTIONS: "-javaagent:/var/task/sentry-opentelemetry-agent.jar"
        run: serverless deploy --stage "${SERVERLESS_STAGE}" --region "${AWS_REGION}" --verbose