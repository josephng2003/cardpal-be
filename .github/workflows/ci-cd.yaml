name: Cardpal BE continuous integration

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      stage:
        description: Serverless stage to deploy
        required: true
        default: prod
        type: choice
        options: [dev, staging, prod]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref || github.ref_name }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "24"
  SENTRY_AGENT_VERSION: "8.47.0"
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and run tests
        run: ./gradlew clean build --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          if-no-files-found: ignore

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-artifact
          path: build/libs/*.jar
          if-no-files-found: error
